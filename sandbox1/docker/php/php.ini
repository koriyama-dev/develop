;==============================================================================
; PHP 8.5 基本設定
;==============================================================================

; ----- タイムゾーン / メモリ / ファイルサイズ -----
date.timezone = Asia/Tokyo
; Laravel のリクエスト処理に十分なメモリを確保 (重い処理がある場合は増やす)
memory_limit = 512M
upload_max_filesize = 100M
; post_max_size は upload_max_filesize より大きくする必要がある
post_max_size = 128M
; スクリプトが強制終了されるまでの最大実行時間
max_execution_time = 60

; ----- エラー表示設定 -----
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
error_log = /dev/stderr

;==============================================================================
; ファイルシステムキャッシュ設定
;==============================================================================
; Laravel は起動時に大量のファイルを require するため realpath 解決結果をキャッシュ
; デフォルト (4096k) は Laravel + パッケージ群には不足するため拡大
realpath_cache_size = 4096k
realpath_cache_ttl = 600

;==============================================================================
; OPcache 設定
;==============================================================================
[opcache]
opcache.enable = 1
; コンパイル済みバイトコードを格納するための共有メモリサイズ
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; ファイル変更を毎リクエスト確認
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1
; Laravel の DI/バリデーション/ルーティングは PHP Attributes を使用するため必須
opcache.save_comments = 1
; Xdebug と JIT は同時使用不可のため OFF (PHP 8.5 でも Xdebug 併用環境では明示的に OFF)
opcache.jit = disable
opcache.jit_buffer_size = 0
; CLI と FPM 間でキャッシュ不整合が起きるため Artisan コマンド実行時は無効化
opcache.enable_cli = 0

;==============================================================================
; Xdebug 設定
;==============================================================================
[xdebug]
; XDEBUG_MODE は docker-compose.yml の環境変数で制御するためここでは設定しない
; xdebug.mode = debug
; リクエストヘッダーまたは Cookie でトリガーされた場合のみデバッグを開始 (常時接続による負荷を防ぐ)
xdebug.start_with_request = trigger
xdebug.discover_client_host = true
xdebug.client_port = 9003
xdebug.log = /var/www/html/storage/logs/xdebug.log
; デフォルト (7=All) は非常に冗長なため Warning レベルに抑制してログ肥大化を防ぐ
xdebug.log_level = 3
