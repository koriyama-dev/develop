; ==============================================================================
; PHP 基本設定
; ==============================================================================

; ----- 基本設定 -----
; システムの日時処理を日本標準時に固定 (ログやDB記録の不整合を防ぐため)
date.timezone = Asia/Tokyo
; スクリプトの最大メモリ消費量を拡張 (Laravelの重量な処理やComposer実行を安定させるため)
memory_limit = 512M
; アップロード可能な最大ファイルサイズを拡張 (大容量の画像や動画投稿に対応させるため)
upload_max_filesize = 100M
; POSTデータの最大許容サイズを設定 (ファイル本体以外のメタデータを含めた通信を許可するため)
post_max_size = 128M
; スクリプトの最大実行時間を延長 (バッチ処理や重いクエリのタイムアウトを回避するため)
max_execution_time = 60

; ----- エラー設定 -----
; エラーを画面に表示 [本番環境: display_errors = Off, display_startup_errors = Off に変更すること]
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
; エラーをログへ出力 (displayと並行してログにも残しデバッグ情報を保全するため)
log_errors = On
; エラーログをコンテナ標準エラー出力へ転送 (docker logsで一括監視できるようにするため)
error_log = /dev/stderr

; ----- セッションセキュリティ設定 -----
; CookieへのJavaScriptアクセスを禁止 (XSSによるセッションハイジャックを防止するため)
session.cookie_httponly = On
; セッションCookieをHTTPS限定で送信 [本番環境: On を維持すること]
session.cookie_secure = On
; SameSite属性を設定 (CSRF攻撃のリスクを低減させるため)
session.cookie_samesite = Lax

; ----- 高速化設定 -----
[opcache]
; OPcacheを有効化 (コンパイル済みバイトコードを再利用しレスポンスを高速化するため)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; タイムスタンプ検証を有効化 (開発環境でのコード修正をリアルタイムに反映させるため)
; [本番環境: opcache.validate_timestamps = 0, opcache.revalidate_freq = 0 に変更すること]
opcache.validate_timestamps = 1
; 毎リクエストでファイル変更を確認 (開発中の即時反映を保証するため)
opcache.revalidate_freq = 0
; JITコンパイラを無効化 (Xdebugとの競合による不安定な動作を回避するため)
opcache.jit = disable
opcache.jit_buffer_size = 0

; ----- デバッグ設定 -----
[xdebug]
# XDEBUG_MODEはdocker-compose.ymlの環境変数で制御するためここでは設定しない
# xdebug.mode = debug
# リクエストヘッダーまたはCookieでトリガーされた場合のみデバッグを開始(常時接続による負荷を防ぐ)
xdebug.start_with_request = trigger
; 接続元IPを自動検知 (Dockerホスト側のIP変動に柔軟に対応させるため)
xdebug.discover_client_host = true
xdebug.client_port = 9003
; デバッグログの出力先を指定 (接続エラー時の原因究明を容易にするため)
xdebug.log = /var/www/html/storage/logs/xdebug.log
