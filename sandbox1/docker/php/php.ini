;==============================================================================
; PHP 基本設定
;==============================================================================

; ----- 基本設定 -----
; ログや DB 記録の不整合を防ぐためシステムの日時処理を日本標準時に固定
date.timezone = Asia/Tokyo
; Laravel の重量な処理や Composer 実行を安定させるためメモリ上限を拡張
memory_limit = 512M
; 大容量の画像や動画投稿に対応させるためアップロード上限を拡張
upload_max_filesize = 100M
; ファイル本体以外のメタデータを含めた通信を許可するため POST データ上限を設定
post_max_size = 128M
; バッチ処理や重いクエリのタイムアウトを回避するためスクリプト最大実行時間を延長
max_execution_time = 60

; ----- エラー設定 -----
; [本番環境] display_errors = Off, display_startup_errors = Off に変更すること
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
; display と並行してデバッグ情報をログにも保全
log_errors = On
; docker logs で一括監視できるようエラーログをコンテナ標準エラー出力へ転送
error_log = /dev/stderr

; ----- セッションセキュリティ設定 -----
; XSS によるセッションハイジャックを防止するため Cookie への JS アクセスを禁止
session.cookie_httponly = On
; [本番環境] On を維持すること (HTTPS 限定で Cookie を送信)
session.cookie_secure = On
; CSRF 攻撃のリスクを低減するため SameSite 属性を設定
session.cookie_samesite = Lax

; ----- OPcache設定 -----
[opcache]
; コンパイル済みバイトコードを再利用しレスポンスを高速化
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
; Laravel + Vendor ファイル数を考慮して余裕を持たせた上限値
opcache.max_accelerated_files = 20000
; 開発環境でのコード修正をリアルタイムに反映させるためタイムスタンプ検証を有効化
; [本番環境] opcache.validate_timestamps = 0, opcache.revalidate_freq = 0 に変更すること
opcache.validate_timestamps = 1
; 毎リクエストでファイル変更を確認し開発中の即時反映を保証
opcache.revalidate_freq = 0
; Xdebug との競合による不安定な動作を回避するため JIT を無効化
; [本番環境] opcache.jit = tracing, opcache.jit_buffer_size = 64M に変更すること
opcache.jit = off
opcache.jit_buffer_size = 0
; Laravel の Attribute/アノテーション読取を正常動作させるためコメントを保持
opcache.save_comments = 1

; ----- Xdebug設定 -----
[xdebug]
; XDEBUG_MODE は docker-compose.yml の環境変数で制御するためここでは設定しない
; xdebug.mode = debug
; 常時接続による負荷を防ぐためリクエストヘッダーまたは Cookie でトリガーされた場合のみデバッグを開始
xdebug.start_with_request = trigger
; Docker ホスト側の IP 変動に柔軟に対応するため接続元 IP を自動検知
xdebug.discover_client_host = true
xdebug.client_port = 9003
; 接続エラー時の原因究明を容易にするためデバッグログの出力先を指定
xdebug.log = /var/www/html/storage/logs/xdebug.log
