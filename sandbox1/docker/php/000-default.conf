# --- HTTP (Port 80) ---
<VirtualHost *:80>
    # 常に HTTPS へリダイレクトする設定
    RewriteEngine on
    RewriteCond %{HTTPS} off
    RewriteRule ^/(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]

    # HTTPアクセス時のログを分けて、リダイレクトのトラブル調査
    ErrorLog /var/log/apache2/error.log
    CustomLog /var/log/apache2/access.log combined
</VirtualHost>

# --- HTTPS (Port 443) ---
<VirtualHost *:443>
    # Laravel の公開ディレクトリを指定
    DocumentRoot /var/www/html/public
    ServerName localhost

    # SSL設定 (既存の証明書パスを維持)
    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key

    # Laravel 13 で推奨されるセキュリティヘッダー（HSTSなど）を Apache 側で補助
    Header always set Strict-Transport-Security "max-age=63072000"

    <Directory "/var/www/html/public">
        # .htaccess の利用を許可 (Laravelに必須)
        AllowOverride All
        # すべてのアクセスを許可
        Require all granted
        # シンボリックリンクの参照を許可 (storage:link等で必要)
        Options FollowSymLinks

        # ディレクトリ内のファイル一覧を表示させない（セキュリティ対策）
        Options -Indexes
    </Directory>

    # HTTPS用のログ出力設定
    ErrorLog /var/log/apache2/error.log
    CustomLog /var/log/apache2/access.log combined
</VirtualHost>
