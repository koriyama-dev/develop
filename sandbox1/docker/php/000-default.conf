# ==============================================================================
# Apache 仮想ホスト設定
# ==============================================================================

# --- HTTP (Port 80) 設定 ---
<VirtualHost *:80>
    ServerName base.local
    RewriteEngine on
    RewriteCond %{HTTPS} off
    # 常時SSL化を強制 (通信経路の暗号化を標準化するため)
    RewriteRule ^(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]

    # 標準エラー出力へ転送 (docker logsコマンドでログを可視化するため)
    ErrorLog /dev/stderr
    # 標準出力へ転送 (コンテナのログ集約基盤に対応させるため)
    CustomLog /dev/stdout combined
</VirtualHost>

# --- HTTPS (Port 443) 設定 ---
<VirtualHost *:443>
    # 公開ディレクトリをpublicに制限 (システムファイルの露出を防ぎ安全性を高めるため)
    DocumentRoot /var/www/html/public
    ServerName base.local

    # SSL設定
    SSLEngine on
    # デフォルトの証明書を使用 (ローカル環境で迅速にSSL通信を実現するため)
    SSLCertificateFile    /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key
    # プロトコルを制限 (脆弱性のある旧バージョンを排除し安全性を確保するため)
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder on

    # 基本的なセキュリティヘッダーを追加 (ブラウザ側での攻撃リスクを低減させるため)
    Header always set Strict-Transport-Security "max-age=63072000"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    <Directory "/var/www/html/public">
        # 上書きを許可 (Laravelの.htaccessによるルーティングを有効にするため)
        AllowOverride All
        Require all granted
        # インデックス表示を禁止 (ディレクトリ構造の漏洩を防止するため)
        Options +FollowSymLinks -Indexes
    </Directory>

    # 標準エラー出力へ転送 (SSL通信時のエラーをホスト側で監視するため)
    ErrorLog /dev/stderr
    # 標準出力へ転送 (アクセス統計をリアルタイムで確認するため)
    CustomLog /dev/stdout combined
</VirtualHost>
