#==============================================================================
# Apache 仮想ホスト設定
#==============================================================================

# ----- HTTP (Port 80) -----
<VirtualHost *:80>
    ServerName base.local

    RewriteEngine on
    RewriteCond %{HTTPS} off
    # 通信経路の暗号化を標準化するため常時 SSL 化を強制
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>

# ----- HTTPS (Port 443) -----
<VirtualHost *:443>
    # システムファイルの露出を防ぐため公開ディレクトリを public に制限
    DocumentRoot /var/www/html/public
    ServerName base.local

    # ----- SSL/TLS設定 -----
    SSLEngine on
    # [本番環境] 認証局発行の証明書パスに変更すること
    SSLCertificateFile    /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key
    # 脆弱性のある旧バージョンを排除し TLS 1.2 / 1.3 のみ許可
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    # 2026年時点の推奨暗号スイート (ECDHE/DHE 優先、RC4/3DES/MD5 排除)
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:!aNULL:!MD5:!3DES:!RC4
    SSLHonorCipherOrder on
    # TLS セッションチケットを無効化し Forward Secrecy を強制
    SSLSessionTickets off

    # ----- セキュリティヘッダー -----
    # HSTS: 2年間 HTTPS 強制 (ブラウザキャッシュによるダウングレード攻撃を防止)
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    # MIME スニッフィングによるコンテンツ型誤認攻撃を防止
    Header always set X-Content-Type-Options "nosniff"
    # クリックジャッキング攻撃を防止
    Header always set X-Frame-Options "SAMEORIGIN"
    # リファラー情報の送信範囲を制限しプライバシーを保護
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    # カメラ・マイク・位置情報などブラウザ機能へのアクセスを制限 (不要な機能の悪用を防止)
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"

    <Directory "/var/www/html/public">
        # Laravel の .htaccess によるルーティングを有効にするため上書きを許可
        AllowOverride All
        Require all granted
        # ディレクトリ構造の漏洩を防止するためインデックス表示を禁止
        Options +FollowSymLinks -Indexes
    </Directory>

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
