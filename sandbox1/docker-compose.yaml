#==============================================================================
# サービス定義
#==============================================================================
services:

  # ----- 統合Appサーバー (Apache + Scheduler + Worker) -----
  app:
    container_name: app
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      # Supervisor による複数プロセスの一元管理を行う統合ステージを指定
      target: apache_env
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - ./src:/var/www/html
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Tokyo}
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
      - XDEBUG_CONFIG=client_port=${XDEBUG_CLIENT_PORT:-9003}
    # 実行中のジョブやワーカーを安全に停止させるため猶予を 1 時間に設定
    stop_grace_period: 3600s
    depends_on:
      db:
        # 起動直後の接続エラーを確実に防止するため完全な準備完了を待機
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    networks:
      - app_network

  # ----- データベース (MySQL 8.4 LTS) -----
  # MySQL 8.4 LTS: 2026年4月時点の現行 LTS / MySQL 8.0 は同月 EOL 到達済み
  db:
    container_name: db
    image: mysql:8.4
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - ./docker/db/my.cnf:/etc/mysql/conf.d/my.cnf
      # コンテナ起動時の自動環境構築のための初期化スクリプト配置場所
      - ./docker/db/init:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    healthcheck:
      # $$ で変数をエスケープし Docker Compose による早期展開を回避 (コマンドライン平文埋め込みを防止するため MYSQL_PWD 環境変数経由で渡す)
      test: ["CMD-SHELL", "MYSQL_PWD=${DB_ROOT_PASSWORD} mysqladmin ping -h localhost -u root --silent"]
      interval: 5s
      timeout: 5s
      retries: 5
      # MySQL の初期化完了を待つため最初のチェック開始を遅延させる
      start_period: 30s
    networks:
      - app_network

  # ----- キャッシュ (Redis 7.2) -----
  # Redis 7.2: BSDv3 ライセンス最終版 (7.4 以降は RSALv2/SSPL に変更)
  # バージョンを 7.2 に明示固定しライセンス変更の影響を受けないようにする
  redis:
    container_name: redis
    image: redis:7.2-alpine
    # コンテナ再起動時のデータ消失を防止するため AOF モードを有効化
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network

  # ----- メールテスト (Mailpit) -----
  # v1.29: 2026年4月時点の最新安定版 / v1.29.2 で CVE-2026-27808 (SSRF) 修正済み
  mailpit:
    container_name: mailpit
    image: axllent/mailpit:v1.29
    ports:
      - "${MAIL_PORT:-1025}:1025"
      # ブラウザ経由で送信メールを視覚的に確認するための管理画面ポート
      - "${MAIL_DASHBOARD_PORT:-8025}:8025"
    environment:
      - TZ=${TZ:-Asia/Tokyo}
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network

#==============================================================================
# 永続化ボリューム定義
#==============================================================================
volumes:
  # コンテナ破棄後もデータを永続化するための名前付きボリューム
  db_data:
  mailpit_data:
  redis_data:

#==============================================================================
# ネットワーク定義
#==============================================================================
networks:
  # プロジェクト単位で通信空間を分離隔離するためのブリッジネットワーク
  app_network:
    driver: bridge
