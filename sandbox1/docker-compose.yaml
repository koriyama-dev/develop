#==============================================================================
# サービス定義
#==============================================================================
services:

  # ----- 統合Appサーバー (Apache + Scheduler + Worker) -----
  app:
    container_name: app
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      # 統合ステージを指定 (Supervisorによる複数プロセスの一元管理のため)
      target: apache_env
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - ./src:/var/www/html
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Tokyo}
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
      - XDEBUG_CONFIG=client_port=${XDEBUG_CLIENT_PORT:-9003}
    # 終了猶予を1時間に設定 (実行中のジョブやワーカーを安全に停止させるため)
    stop_grace_period: 3600s
    depends_on:
      db:
        # 完全な準備完了を待機 (起動直後の接続エラーを確実に防止するため)
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    networks:
      - app_network

  # ----- データベース (MySQL 8.4 LTS) -----
  db:
    container_name: db
    image: mysql:8.4
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - ./docker/db/my.cnf:/etc/mysql/conf.d/my.cnf
      # 初期化スクリプトを配置 (コンテナ起動時の自動環境構築のため)
      - ./docker/db/init:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    healthcheck:
      # パスワードを環境変数経由で渡す (コマンドライン引数への平文埋め込みを回避するため)
      test: ["CMD-SHELL", "MYSQL_PWD=${DB_ROOT_PASSWORD} mysqladmin ping -h localhost -u root --silent"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ----- キャッシュ (Redis 7) -----
  redis:
    container_name: redis
    image: redis:7-alpine
    # AOFモードを有効化 (コンテナ再起動時のデータ消失を防止するため)
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ----- メールテスト (Mailpit) -----
  mailpit:
    container_name: mailpit
    # バージョンを固定 (意図しないbreaking changeによる動作不良を防止するため)
    image: axllent/mailpit:v1.21
    ports:
      - "${MAIL_PORT:-1025}:1025"
      # 管理画面ポートを開放 (ブラウザ経由で送信メールを視覚的に確認するため)
      - "${MAIL_DASHBOARD_PORT:-8025}:8025"
    environment:
      - TZ=${TZ:-Asia/Tokyo}
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

#==============================================================================
# 永続化ボリューム定義
#==============================================================================
volumes:
  # 名前付きボリュームを定義 (コンテナ破棄後もデータを永続化させるため)
  db_data:
  mailpit_data:
  redis_data:

#==============================================================================
# ネットワーク定義
#==============================================================================
networks:
  app_network:
    # ブリッジドライバを明示 (プロジェクト単位で通信空間を分離隔離するため)
    driver: bridge
