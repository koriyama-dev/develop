services:
  # --- 統合Appサーバー (Apache + Scheduler + Worker) ---
  # Dockerfileで統合した apache_env ステージを使用し、全プロセスをこの1台で管理
  app:
    container_name: app
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: apache_env # 統合されたステージを指定（SupervisorがPID 1として動作）
    ports:
      - "${APP_PORT:-80}:80"      # HTTP
      - "${APP_SSL_PORT:-443}:443" # HTTPS
    volumes:
      # ホストの ./src ディレクトリをコンテナの /var/www/html に同期
      - ./src:/var/www/html
    environment:
      - TZ=Asia/Tokyo
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Tokyo}
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
      - XDEBUG_CONFIG=client_port=9003
    # WSL2環境でWindowsホスト側のデバッガ(VSCode等)と通信するための設定
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy # DBが完全に準備できてからApp(Worker)を起動させる
      redis:
        condition: service_healthy # redisもhealthcheck付きで待機する

  # --- データベース (MySQL 8.4 LTS) ---
  db:
    container_name: db
    image: mysql:8.4
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - ./docker/db/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker/db/init:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    healthcheck:
      # appサービスの depends_on: condition: service_healthy で参照するため
      # これによりAppコンテナ起動時の「DB接続待ちエラー」を防止
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- メモリデータベース (Redis 7) ---
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes # データの永続化を有効化
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    # appサービスの depends_on: condition: service_healthy で参照するため
    # これによりredis-cli ping が "PONG" を返せばコンテナが準備完了と判定
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- メールテスト (Mailpit) ---
  # 開発中に送信されるメールをキャッチしてブラウザで確認可能にします
  mailpit:
    container_name: mailpit
    image: axllent/mailpit:latest
    ports:
      - "${MAIL_PORT:-1025}:1025"      # SMTPポート
      - "${MAIL_DASHBOARD_PORT:-8025}:8025" # 管理画面 (http://localhost:8025)
    environment:
      - TZ=${TZ:-Asia/Tokyo}
    volumes:
      - mailpit_data:/data

# データの永続化設定（コンテナを消しても残る）
volumes:
  db_data:      # MySQLのデータ
  mailpit_data: # メールの履歴データ
  redis_data:   # redisのデータ
