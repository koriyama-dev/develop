#==============================================================================
# サービス定義
#==============================================================================
services:

  # ----- Web サーバー (Nginx stable-alpine) -----
  web:
    container_name: web-2
    image: nginx:1.30-alpine
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - ../src:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/ssl:/etc/nginx/ssl:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - app_network

  # ----- アプリケーションサーバー (PHP 8.5-FPM + Supervisor) -----
  app:
    container_name: app-2
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: app_env
    volumes:
      # アプリコンテナはファイル書き込みが必要なため読み書き可でマウント
      - ../src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini:ro
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Tokyo}
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
      - XDEBUG_CONFIG=client_port=${XDEBUG_CLIENT_PORT:-9003}
    healthcheck:
      # PHP-FPM (9000番ポート) の疎通確認
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      # Supervisor による各プロセス起動完了を待つため start_period を長めに設定
      start_period: 30s
    # Dockerが強制終了するまでの猶予
    stop_grace_period: 30s
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - app_network

  # ----- データベース (MySQL 8.4 LTS) -----
  db:
    container_name: db-2
    image: mysql:8.4
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - ./docker/db/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
      - db_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h", "localhost",
          "-u", "root",
          "--password=${DB_ROOT_PASSWORD}",
          "--silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      # 初回起動時のデータ初期化中は healthcheck が失敗するため猶予を設ける
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - app_network

  # ----- キャッシュ (Valkey 8 alpine) -----
  valkey:
    container_name: valkey-2
    image: valkey/valkey:8-alpine
    # appendonly で AOF 永続化を有効化 (コンテナ再起動時のデータ消失を防ぐ)
    command: valkey-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      # 起動直後の ping 失敗を正常な起動時間として猶予を設ける
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - app_network

  # ----- メールテスト (Mailpit) -----
  mailpit:
    container_name: mailpit-2
    image: axllent/mailpit:v1.22
    ports:
      - "${MAIL_PORT:-1025}:1025"
      - "${MAIL_DASHBOARD_PORT:-8025}:8025"
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      # SQLite データファイルのパスを明示 (volume マウント先と一致させる)
      - MP_DATA_FILE=/data/mailpit.db
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - app_network

#==============================================================================
# ボリューム定義
#==============================================================================
volumes:
  db_data:
  mailpit_data:
  valkey_data:

#==============================================================================
# ネットワーク定義
#==============================================================================
networks:
  app_network:
    # bridge ドライバーで各コンテナを同一仮想ネットワーク内に配置
    driver: bridge
