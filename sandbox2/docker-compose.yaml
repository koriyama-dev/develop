#==============================================================================
# サービス定義
#==============================================================================
services:

  # ----- Web サーバー (Nginx stable-alpine) -----
  web:
    container_name: web
    # stable-alpineはNginx公式の安定版タグ(2026年4月現在 1.28.x系)
    image: nginx:stable-alpine
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      # ソースコードは静的ファイル配信のみのため読み取り専用でマウント
      - ./src:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  # ----- アプリケーションサーバー (PHP-FPM + Supervisor) -----
  app:
    container_name: app
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: app_env
    volumes:
      # アプリコンテナはファイル書き込みが必要なため読み書き可でマウント
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Tokyo}
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
      - XDEBUG_CONFIG=client_port=${XDEBUG_CLIENT_PORT:-9003}
    healthcheck:
      # PHP-FPM(9000番ポート)の疎通確認
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      # Supervisorによる各プロセス起動完了を待つためstart_periodを長めに設定
      start_period: 30s
    # worker.confのstopwaitsecs=3600に合わせてGraceful Shutdownを待機
    stop_grace_period: 3600s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  # ----- データベース (MySQL 8.4 LTS) -----
  db:
    container_name: db
    # mysql:8.4はLTSタグ(2026年4月現在 8.4.8、EOL 2032年4月)
    image: mysql:8.4
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - ./docker/db/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker/db/init:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p'${DB_ROOT_PASSWORD}' --silent"]
      interval: 5s
      timeout: 5s
      retries: 5
      # 初回起動時のデータ初期化中はhealthcheckが失敗するため猶予を設ける
      start_period: 30s
    restart: unless-stopped
    networks:
      - app_network

  # ----- キャッシュ (Redis 8 alpine) -----
  redis:
    container_name: redis
    # redis:8-alpine: 2026年4月現在のstable(8.6.x系)
    # [注意] Redis 8以降はRSALv2/SSPL/AGPLのトリプルライセンス、OSSプロジェクトでの利用は確認が必要
    image: redis:8-alpine
    # appendonlyでAOF永続化を有効化(コンテナ再起動時のデータ消失を防ぐ)
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      # 起動直後のping失敗を正常な起動時間として猶予を設ける
      start_period: 10s
    restart: unless-stopped
    networks:
      - app_network

  # ----- メールテスト (Mailpit) -----
  mailpit:
    container_name: mailpit
    # latestタグはMailpit公式が推奨するタグ
    image: axllent/mailpit:latest
    ports:
      - "${MAIL_PORT:-1025}:1025"
      - "${MAIL_DASHBOARD_PORT:-8025}:8025"
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      # SQLiteデータファイルのパスを明示(volumeマウント先と一致させる)
      - MP_DATA_FILE=/data/mailpit.db
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 5s
      timeout: 5s
      retries: 5
      # 起動直後のping失敗を正常な起動時間として猶予を設ける
      start_period: 10s
    restart: unless-stopped
    networks:
      - app_network

#==============================================================================
# ボリューム定義
#==============================================================================
volumes:
  db_data:
  mailpit_data:
  redis_data:

#==============================================================================
# ネットワーク定義
#==============================================================================
networks:
  app_network:
    # bridgeドライバーで各コンテナを同一仮想ネットワーク内に配置
    driver: bridge
