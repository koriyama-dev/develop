;==============================================================================
; PHP 8.5 基本設定
;==============================================================================

; ----- タイムゾーン / メモリ / ファイルサイズ -----
date.timezone = Asia/Tokyo
; Laravelのリクエスト処理に十分なメモリを確保(重い処理がある場合は増やす)
memory_limit = 512M
upload_max_filesize = 100M
; post_max_sizeはupload_max_filesizeより大きくする必要がある
post_max_size = 128M
; [本番環境] 60秒を超えるAPIやバッチはqueue:workに委譲すること
max_execution_time = 60

; ----- エラー表示設定 -----
; [本番環境] display_errors=Off / log_errors=On に変更すること
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

;==============================================================================
; ファイルシステムキャッシュ設定
;==============================================================================
; Laravelは起動時に大量のファイルをrequireするためrealpath解決結果をキャッシュ
; デフォルト(4096k)はLaravel+パッケージ群には不足するため拡大
realpath_cache_size = 4096k
realpath_cache_ttl = 600

;==============================================================================
; OPcache 設定
;==============================================================================
[opcache]
opcache.enable = 1
; コンパイル済みバイトコードを格納するための共有メモリサイズ
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; ファイル変更を毎リクエスト確認(開発環境向け、[本番環境]はrevalidate_freq=0のままvalidate_timestamps=0にする)
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1
; LaravelのDI/バリデーション/ルーティングはPHP Attributesやdocコメントを使用するため必須
opcache.save_comments = 1
; XdebugとJITは同時使用不可のためOFF(PHP 8.5でもXdebug併用環境では明示的にOFF)
opcache.jit = off
opcache.jit_buffer_size = 0
; CLIとFPM間でキャッシュ不整合が起きるためArtisanコマンド実行時は無効化
opcache.enable_cli = 0

;==============================================================================
; Xdebug 設定
;==============================================================================
[xdebug]
; XDEBUG_MODEはdocker-compose.ymlの環境変数で制御するためここでは設定しない
; xdebug.mode = debug
; リクエストヘッダーまたはCookieでトリガーされた場合のみデバッグを開始(常時接続による負荷を防ぐ)
xdebug.start_with_request = trigger
xdebug.discover_client_host = true
xdebug.client_port = 9003
xdebug.log = /var/www/html/storage/logs/xdebug.log
; デフォルト(7=All)は非常に冗長なためWarningレベルに抑制してログ肥大化を防ぐ
xdebug.log_level = 3
