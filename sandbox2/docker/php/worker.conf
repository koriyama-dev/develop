;==============================================================================
; Supervisor UNIXソケット設定
;==============================================================================
[unix_http_server]
file=/var/run/supervisor.sock
; rootのみアクセス可能なパーミッション
chmod=0700

;==============================================================================
; Supervisord デーモン設定
;==============================================================================
[supervisord]
; foregroundで動作させDockerのPID1として管理できるようにする
nodaemon=true
user=root
; コンテナログをDockerデーモンに集約するためstdoutへ出力
logfile=/dev/fd/1
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid
environment=TZ="Asia/Tokyo",APP_TIMEZONE="Asia/Tokyo"

;==============================================================================
; RPCインターフェース / クライアント設定
;==============================================================================
[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

;==============================================================================
; PHP-FPM プロセス設定
;==============================================================================
[program:php-fpm]
; ログにプログラム名を付与して識別しやすくする
command=bash -c "exec php-fpm -F 2>&1 | stdbuf -oL sed 's/^/[PHP-FPM] /'"
directory=/var/www/html
autostart=true
autorestart=true
; 起動後5秒間安定稼働した場合のみ正常起動とみなし無限restartループを防ぐ
startsecs=5
user=root
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

;==============================================================================
; Laravel スケジューラー設定
;==============================================================================
[program:laravel-scheduler]
; ログにプログラム名を付与して識別しやすくする
command=bash -c "exec /usr/local/bin/php -d output_buffering=0 /var/www/html/artisan schedule:work 2>&1 | stdbuf -oL sed 's/^/[SCHEDULER] /'"
directory=/var/www/html
autostart=true
autorestart=true
user=www-data
; schedule:workは1分ごとに実行するため60秒では実行中にSIGKILLが飛ぶリスクがある(65秒で余裕を確保)
stopwaitsecs=65
; 起動後5秒間安定稼働した場合のみ正常起動とみなし無限restartループを防ぐ
startsecs=5
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20

;==============================================================================
; Laravel キューワーカー設定
;==============================================================================
[program:laravel-worker]
; ログにプログラム名を付与して識別しやすくする
command=bash -c "exec /usr/local/bin/php -d output_buffering=0 /var/www/html/artisan queue:work --sleep=3 --tries=3 --max-jobs=1000 --queue=high,default,low 2>&1 | stdbuf -oL sed 's/^/[WORKER] /'"
directory=/var/www/html
autostart=true
autorestart=true
user=www-data
; デフォルト値だが複数ワーカーへの拡張時の変更箇所を明確にするため明示
; 複数ワーカーが必要な場合はnumprocsを増やしprocess_nameに%(process_num)02dを追加する
numprocs=1
; queue:workのGraceful Shutdown待機時間(docker-compose.ymlのstop_grace_periodと合わせる)
stopwaitsecs=3600
; 起動後5秒間安定稼働した場合のみ正常起動とみなし無限restartループを防ぐ
startsecs=5
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_events_enabled=true
stderr_events_enabled=true
priority=30
