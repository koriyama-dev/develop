;==============================================================================
; Supervisor UNIX ソケット設定
;==============================================================================
[unix_http_server]
file=/var/run/supervisor.sock
; root のみアクセス可能なパーミッション
chmod=0700

;==============================================================================
; Supervisord デーモン設定
;==============================================================================
[supervisord]
; foreground で動作させ Docker の PID1 として管理できるようにする
nodaemon=true
user=root
; コンテナログを Docker デーモンに集約するため stdout へ出力
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid
environment=TZ="Asia/Tokyo",APP_TIMEZONE="Asia/Tokyo"

;==============================================================================
; RPC インターフェース / クライアント設定
;==============================================================================
[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

;==============================================================================
; PHP-FPM プロセス設定
;==============================================================================
[program:php-fpm]
; ログにプログラム名を付与して識別しやすくする
command=bash -c "exec php-fpm -F 2>&1 | stdbuf -oL sed 's/^/[PHP-FPM] /'"
directory=/var/www/html
autostart=true
autorestart=true
; 起動後 5 秒間安定稼働した場合のみ正常起動とみなし無限 restart ループを防ぐ
startsecs=5
user=root
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

;==============================================================================
; Laravel スケジューラー設定
;==============================================================================
[program:laravel-scheduler]
; ログにプログラム名を付与して識別しやすくする
command=bash -c "exec /usr/local/bin/php -d output_buffering=0 /var/www/html/artisan schedule:work 2>&1 | stdbuf -oL sed 's/^/[SCHEDULER] /'"
directory=/var/www/html
autostart=true
autorestart=true
user=www-data
; queue:work の Graceful Shutdown 待機時間 (docker-compose.yml の stop_grace_period と合わせる)
stopwaitsecs=29
; 起動後 5 秒間安定稼働した場合のみ正常起動とみなし無限 restart ループを防ぐ
startsecs=5
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20

;==============================================================================
; Laravel キューワーカー設定
;==============================================================================
[program:laravel-worker]
; ログにプログラム名を付与して識別しやすくする
command=bash -c "exec /usr/local/bin/php -d output_buffering=0 /var/www/html/artisan queue:work --sleep=3 --tries=3 --max-jobs=1000 --max-time=3600 --queue=high,default,low 2>&1 | stdbuf -oL sed 's/^/[WORKER] /'"
directory=/var/www/html
autostart=true
autorestart=true
user=www-data
; 複数ワーカーが必要な場合は numprocs を増やし process_name に %(process_num)02d を追加する
numprocs=1
; queue:work の Graceful Shutdown 待機時間 (docker-compose.yml の stop_grace_period と合わせる)
stopwaitsecs=29
; 起動後 5 秒間安定稼働した場合のみ正常起動とみなし無限 restart ループを防ぐ
startsecs=5
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_events_enabled=true
stderr_events_enabled=true
priority=30
