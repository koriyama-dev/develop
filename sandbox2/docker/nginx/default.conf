#==============================================================================
# HTTP → HTTPS リダイレクト
#==============================================================================
server {
    listen 80;
    server_name base.local;

    # 一時ファイルの書き込み先を www-data が書き込める場所に変更
    client_body_temp_path /tmp/nginx_client_temp;
    proxy_temp_path        /tmp/nginx_proxy_temp;
    fastcgi_temp_path      /tmp/nginx_fastcgi_temp;

    return 301 https://$host$request_uri;
}

#==============================================================================
# HTTPS メインサーバー
#==============================================================================
server {
    listen 443 ssl;
    # Nginx 1.30 stable で正式採用 (以前は http2 ディレクティブが listen に統合されていた)
    http2 on;
    server_name base.local;
    root /var/www/html/public;
    index index.php;

    # 一時ファイルの書き込み先を www-data が書き込める場所に変更
    client_body_temp_path /tmp/nginx_client_temp;
    proxy_temp_path        /tmp/nginx_proxy_temp;
    fastcgi_temp_path      /tmp/nginx_fastcgi_temp;

    # ----- 基本設定 -----
    # Laravel が扱う最大リクエストサイズ (php.ini の post_max_size と合わせる)
    client_max_body_size 128M;
    charset utf-8;

    # ----- SSL 設定 -----
    ssl_certificate     /etc/nginx/ssl/ssl.crt;
    ssl_certificate_key /etc/nginx/ssl/ssl.key;
    # TLSv1.2 以下は廃止 (POODLE/BEAST 対策)、TLSv1.3 を優先
    ssl_protocols       TLSv1.2 TLSv1.3;
    # aNULL/MD5/3DES は脆弱暗号のため除外
    ssl_ciphers         HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    # TLS 1.3 の Forward Secrecy を維持するためセッションチケットを無効化
    ssl_session_tickets off;
    # OCSP ステープリングで証明書失効確認のレイテンシを削減
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ----- セキュリティヘッダー -----
    # ブラウザに HTTPS 強制を指示 (63072000秒=2年、HSTS プリロード推奨値)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    # MIME タイプ推測を禁止 (XSS/ドライブバイダウンロード緩和)
    add_header X-Content-Type-Options    "nosniff" always;
    # クリックジャッキング防止 (同一オリジンの iframe のみ許可)
    add_header X-Frame-Options           "SAMEORIGIN" always;
    # リファラー情報のリーク抑制
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # CSP: 'unsafe-inline' を含む設定はセキュリティスキャンで低評価になるが
    # Vite/Blade 利用環境では nonce ベース移行まで暫定対応
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    # 不要なブラウザ API (カメラ/マイク/位置情報等) を無効化 (サイト要件に応じて調整)
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(), usb=(), fullscreen=(self)" always;
    # window.opener 経由のクロスオリジン参照を遮断 (タブナビゲーション攻撃防止)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # Nginx バージョン情報をレスポンスヘッダーから除去 (情報漏洩防止)
    server_tokens off;

    # ----- ログ設定 -----
    # コンテナログを Docker デーモンに集約するため stdout/stderr へ出力
    access_log /dev/stdout;
    error_log  /dev/stderr;

    # ----- Gzip 圧縮 -----
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/xml text/xml image/svg+xml;
    # 1KB 未満は gzip 圧縮のオーバーヘッドが大きいため除外
    gzip_min_length 1024;
    # CPU 負荷と圧縮率のバランスとして 6 が推奨値
    gzip_comp_level 6;
    gzip_vary on;
    # プロキシ経由リクエストでも gzip を有効にする
    gzip_proxied any;

    # ----- Laravel フロントコントローラ -----
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ----- PHP-FPM プロキシ設定 -----
    location ~ \.php$ {
        # Nginx 1.30 のデフォルトが HTTP/1.1+keepalive に変更されたため明示
        fastcgi_pass  app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include       fastcgi_params;
        # HTTP_PROXY ヘッダーが PHP の HTTP_PROXY 環境変数に渡るのを防ぐ (CVE-2016-5385)
        fastcgi_param HTTP_PROXY "";
        # Laravel の重い処理 (レポート生成等) を考慮したタイムアウト
        fastcgi_read_timeout 300;
        # Laravel の大きなレスポンスに対応するためバッファを拡大
        fastcgi_buffers     16 16k;
        fastcgi_buffer_size 32k;
    }

    # ----- セキュリティ: 隠しファイルへのアクセス禁止 -----
    # .git/.env などの隠しファイルを保護 (.well-known は ACME チャレンジ用に除外)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
