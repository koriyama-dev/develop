#==============================================================================
# HTTP → HTTPS リダイレクト
#==============================================================================
server {
    listen 80;
    server_name base.local;
    return 301 https://$host$request_uri;
}

#==============================================================================
# HTTPS メインサーバー
#==============================================================================
server {
    listen 443 ssl;
    http2 on;
    server_name base.local;
    root /var/www/html/public;
    index index.php;

    # ----- 基本設定 -----
    # Laravelが扱う最大リクエストサイズ(php.iniのpost_max_sizeと合わせる)
    client_max_body_size 128M;
    charset utf-8;

    # ----- SSL 設定 -----
    ssl_certificate     /etc/nginx/ssl/ssl.crt;
    ssl_certificate_key /etc/nginx/ssl/ssl.key;
    # TLSv1.2以下は廃止(POODLE/BEAST対策)、TLSv1.3を優先
    ssl_protocols       TLSv1.2 TLSv1.3;
    # aNULL/MD5/3DESは脆弱暗号のため除外
    ssl_ciphers         HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    # TLS 1.3のForward Secrecyを維持するためセッションチケットを無効化
    ssl_session_tickets off;

    # ----- セキュリティヘッダー -----
    # ブラウザにHTTPS強制を指示(63072000秒=2年、HSTSプリロード推奨値)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    # MIMEタイプ推測を禁止(XSS/ドライブバイダウンロード緩和)
    add_header X-Content-Type-Options    "nosniff" always;
    # クリックジャッキング防止(同一オリジンのiframeのみ許可)
    add_header X-Frame-Options           "SAMEORIGIN" always;
    # レガシーXSSフィルター(モダンブラウザはCSPを優先するが互換性維持)
    add_header X-XSS-Protection          "1; mode=block" always;
    # リファラー情報のリーク抑制
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # CSP: 'unsafe-inline'を含む設定はセキュリティスキャンで低評価になるが
    # Vite/Blade利用環境ではnonceベース移行まで暫定対応
    # [本番環境] nonceベースへの移行とreport-uriの設定を強く推奨
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    # 不要なブラウザAPI(カメラ/マイク/位置情報等)を無効化(サイト要件に応じて調整)
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(), usb=(), fullscreen=(self)" always;
    # window.opener経由のクロスオリジン参照を遮断(タブナビゲーション攻撃防止)
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # ----- ログ設定 -----
    # コンテナログをDockerデーモンに集約するためstdout/stderrへ出力
    access_log /dev/stdout;
    error_log  /dev/stderr;

    # ----- Gzip 圧縮 -----
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/xml text/xml image/svg+xml;
    # 1KB未満はgzip圧縮のオーバーヘッドが大きいため除外
    gzip_min_length 1024;
    # CPU負荷と圧縮率のバランスとして6が推奨値
    gzip_comp_level 6;
    gzip_vary on;
    # プロキシ経由リクエストでもgzipを有効にする
    gzip_proxied any;

    # ----- Laravel フロントコントローラ -----
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ----- PHP-FPM プロキシ設定 -----
    location ~ \.php$ {
        fastcgi_pass  app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include       fastcgi_params;
        # HTTPProxyヘッダーがPHPのHTTP_PROXY環境変数に渡るのを防ぐ(CVE-2016-5385)
        fastcgi_param HTTP_PROXY "";
        # Laravelの重い処理(レポート生成等)を考慮したタイムアウト
        fastcgi_read_timeout 300;
        # Laravelの大きなレスポンスに対応するためバッファを拡大
        fastcgi_buffers     16 16k;
        fastcgi_buffer_size 32k;
    }

    # ----- セキュリティ: 隠しファイルへのアクセス禁止 -----
    # .git/.envなどの隠しファイルを保護(.well-knownはACMEチャレンジ用に除外)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
