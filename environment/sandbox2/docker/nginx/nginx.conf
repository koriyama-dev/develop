user nginx;
# CPUコア数に合わせてワーカープロセス数を自動設定
worker_processes auto;
# エラーログを標準エラー出力にwarnレベルで出力
error_log /dev/stderr warn;
# PIDファイルの保存先（書き込み権限のある/tmpを使用）
pid       /tmp/nginx.pid;

events {
    # 1ワーカーあたりの最大同時接続数
    worker_connections 1024;
}

http {
    # MIMEタイプの定義ファイルを読み込み
    include       /etc/nginx/mime.types;
    # MIMEタイプが不明なファイルのデフォルト設定
    default_type  application/octet-stream;

    # アクセスログのフォーマット定義（IPやUA等の主要情報を記録）
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    # アクセスログを標準出力に出力
    access_log /dev/stdout main;

    # カーネルレベルでのファイル転送を有効化（パフォーマンス向上）
    sendfile    on;
    # sendfile使用時にレスポンスヘッダとファイルをまとめて送信
    tcp_nopush  on;
    # Keep-Aliveの接続タイムアウトを65秒に設定
    keepalive_timeout 65;

    # conf.d配下の設定ファイルをすべて読み込み
    include /etc/nginx/conf.d/*.conf;
}
