services:
  # --- Webサーバー (Apache + PHP 8.5) ---
  app:
    container_name: app
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: apache_env # Dockerfile内のApache用ステージを使用
    ports:
      - "${APP_PORT:-80}:80"      # HTTPポート (デフォルト80)
      - "${APP_SSL_PORT:-443}:443" # HTTPSポート (デフォルト443)
    volumes:
      - &APP_MOUNT_PATH "./src:/var/www/html" # ソースコードを同期
      - ./storage/apache/logs:/var/log/apache2 # Apacheのログをホストで確認
    environment:
      XDEBUG_MODE: ${XDEBUG_MODE:-off} # デバッグモードの切り替え
      XDEBUG_CONFIG: "client_port=9003"
    # WSL2からWindowsホストへ通信を通す
    extra_hosts:
      - "${XDEBUG_CLIENT_HOST:-host.docker.internal}:host-gateway"
    depends_on:
      db:
        condition: service_healthy # DBが完全に起動してからAppを起動

  # --- データベース (MySQL 8.4 LTS) ---
  db:
    container_name: db
    image: mysql:8.4 # 軽量化のためimage指定
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - ./docker/db/my.cnf:/etc/mysql/conf.d/my.cnf # 設定ファイルの反映
      - ./docker/db/init:/docker-entrypoint-initdb.d # 初回起動時のSQL実行用
      - db_data:/var/lib/mysql # DBデータの永続化
    healthcheck:
      # DBの生存確認を行う
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 定期実行 (Cron) ---
  cron:
    container_name: cron
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: cron_env
    environment:
      XDEBUG_MODE: off # 負荷軽減のためデバッグはオフ
    volumes:
      - *APP_MOUNT_PATH
      - ./storage/cron/logs:/var/log/cron
    depends_on:
      app:
        condition: service_started

  # --- キュー処理 (Supervisor) ---
  supervisor:
    container_name: supervisor
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: supervisor_env
    environment:
      XDEBUG_MODE: off # 負荷軽減のためデバッグはオフ
    volumes:
      - *APP_MOUNT_PATH
      - ./storage/supervisor/logs:/var/log/supervisor
    depends_on:
      app:
        condition: service_started

  # --- メールテスト (MailHog) ---
  mailhog:
    container_name: mailhog
    image: mailhog/mailhog:latest
    # メールの保存先をメモリではなくファイル(maildir)に指定
    command: ["-storage=maildir", "-maildir-path=/tmp/mailhog"]
    ports:
      - "${MAIL_PORT:-1025}:1025"         # SMTP受信用
      - "${MAIL_DASHBOARD_PORT:-8025}:8025" # ブラウザ確認用
    volumes:
      # ホストの ./storage/mailhog に保存することで、コンテナを消してもメールが残る
      - *APP_MOUNT_PATH
      - ./storage/mailhog:/tmp/mailhog

volumes:
  db_data: # MySQLデータ保存用の領域を定義
